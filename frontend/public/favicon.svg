<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C08552;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="15" ry="15" fill="url(#bg)" />

  <!-- Dumbbell: left outer circle -->
  <circle cx="11" cy="32" r="7" fill="white" />
  <!-- Dumbbell: left inner collar -->
  <circle cx="19" cy="32" r="4.5" fill="white" />

  <!-- Bar -->
  <rect x="22" y="29.5" width="20" height="5" rx="2.5" fill="white" />

  <!-- Dumbbell: right inner collar -->
  <circle cx="45" cy="32" r="4.5" fill="white" />
  <!-- Dumbbell: right outer circle -->
  <circle cx="53" cy="32" r="7" fill="white" />
</svg>